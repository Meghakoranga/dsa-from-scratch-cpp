<html>
<body>
<h1>JavaScript Arrays</h1>
<h2>The length Property, The toString() method, The at() method, The join() method, The pop() method</h2>
<p id="demo"></p>
<p id="demo2"></p>
<script>
const fruits = ["Banana", "Orange", "Mango"];
let size = fruits.length;
document.getElementById("demo").innerHTML = "Size of the array: " + size + "<br>";
document.getElementById("demo").innerHTML += "Array as a string: " + fruits.toString() + "<br>";
let fruit = fruits.at(1);
document.getElementById("demo").innerHTML += "Second fruit (at index 1): " + fruit + "<br>";
document.getElementById("demo").innerHTML += "Array joined with ' * ': " + fruits.join(" * ") + "<br>";
fruits.pop();
document.getElementById("demo2").innerHTML = "Array after pop: " + fruits;
</script>
</body>
</html><html>
    <body>
    <h1>JavaScript Arrays</h1>
    <h2>The push() Method, The shift() method, The unshift() method, The delete() method</h2>
    <p id="demo1"></p>
    <p id="demo2"></p>
    <script>
    const fruits = ["Banana", "Orange", "Apple", "Mango"];
    document.getElementById("demo1").innerHTML = "Initial array: " + fruits + "<br>";
    fruits.push("Watermelon");
    document.getElementById("demo1").innerHTML += "After push: " + fruits + "<br>";
    fruits.shift();
    document.getElementById("demo1").innerHTML += "After shift: " + fruits + "<br>";
    fruits.unshift("Lemon");
    document.getElementById("demo1").innerHTML += "After unshift: " + fruits + "<br>";
    document.getElementById("demo1").innerHTML += "The first fruit is: " + fruits[0] + "<br>";
    delete fruits[0];
    document.getElementById("demo1").innerHTML += "After delete: The first fruit is now: " + fruits[0] + "<br>";
    document.getElementById("demo2").innerHTML = "Final array: " + fruits;
    </script>
    </body>
    </html>
