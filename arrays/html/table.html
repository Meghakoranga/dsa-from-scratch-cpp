<html>
    <head>
        <style>
            table,
            th,
            td {
                border: 1px solid black;
            }
        </style>
        <title>html table</title>
    </head>
    <body>
        <h1>Html Table</h1>
        <table>
            <tr>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Age</th>
                </tr>
                <tr>
                    <td>priya</td>
                    <td>sharma</td>
                    <td>24</td>
                </tr>
                <tr>
                    <td>Arun</td>
                    <td>singh</td>
                    <td>32</td>
                </tr>
                <tr>
                    <td>Sam</td>
                    <td>Watson</td>
                    <td>41</td>
                </tr>
        </table>
    </body>

</html>
